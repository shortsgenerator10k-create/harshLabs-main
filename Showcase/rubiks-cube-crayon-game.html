<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cube Challenge — Unlock the Portfolio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0a0a0c;
    --panel: #111114;
    --border: #2a2a2e;
    --border-hover: #404046;
    --text: #e8e8ec;
    --text-dim: #6a6a70;
    --accent: #e8483c;
    --accent-glow: rgba(232,72,60,0.25);
    --success: #22c55e;
    --success-glow: rgba(34,197,94,0.25);
    --font: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    overflow: hidden;
    user-select: none;
  }

  /* ===== STATUS BAR ===== */
  #status-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    height: 44px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
    font-size: 0.72rem; letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  #status-left { color: var(--text-dim); }
  #status-left span { color: var(--accent); margin-left: 8px; }
  #status-right {
    display: flex; align-items: center; gap: 12px;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--success); box-shadow: 0 0 8px var(--success);
    animation: blink 2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  #move-counter { color: var(--text-dim); }
  #move-counter span { color: var(--text); font-weight: 600; }

  /* ===== CANVAS ===== */
  #canvas-container {
    position: fixed; top: 44px; left: 0; right: 0; bottom: 140px;
    z-index: 1;
  }
  canvas { display: block; width: 100%; height: 100%; }

  /* ===== CONTROLS PANEL ===== */
  #controls {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    height: 140px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px;
    padding: 0 16px;
  }

  /* Move buttons grid */
  .move-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 6px;
    max-width: 720px; width: 100%;
  }
  .move-btn {
    height: 38px;
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font);
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex; align-items: center; justify-content: center;
    letter-spacing: 0.04em;
    position: relative; overflow: hidden;
  }
  .move-btn:hover {
    border-color: var(--border-hover);
    color: var(--text);
    background: rgba(255,255,255,0.03);
  }
  .move-btn:active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
    transform: scale(0.96);
  }
  .move-btn.prime::after {
    content: "'"; font-size: 0.6rem; margin-left: 1px; opacity: 0.7;
  }
  .move-btn:disabled {
    opacity: 0.3; cursor: not-allowed; pointer-events: none;
  }

  /* Action buttons row */
  .action-row {
    display: flex; gap: 10px;
    max-width: 720px; width: 100%;
  }
  .action-btn {
    flex: 1; height: 42px;
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font);
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    position: relative; overflow: hidden;
  }
  .action-btn:hover {
    border-color: var(--border-hover);
    color: var(--text);
    background: rgba(255,255,255,0.03);
  }
  .action-btn:active {
    transform: scale(0.97);
  }
  .action-btn#scramble-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
  }
  .action-btn#solve-btn:hover {
    border-color: var(--success);
    color: var(--success);
    box-shadow: 0 0 20px var(--success-glow);
  }
  .action-btn:disabled {
    opacity: 0.3; cursor: not-allowed; pointer-events: none;
  }

  /* ===== FLASH MESSAGE ===== */
  #flash {
    position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
    z-index: 100; padding: 10px 24px; border-radius: 0;
    background: var(--panel); border: 1.5px solid var(--border);
    color: var(--text); font-family: var(--font); font-size: 0.8rem;
    letter-spacing: 0.1em; text-transform: uppercase;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
    white-space: nowrap;
  }
  #flash.show { opacity: 1; }
  #flash.error { border-color: var(--accent); color: var(--accent); }
  #flash.success { border-color: var(--success); color: var(--success); }

  /* ===== WIN OVERLAY ===== */
  #win-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(10,10,12,0.92);
    backdrop-filter: blur(12px);
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
  }
  #win-overlay.active { display: flex; }
  .win-title {
    font-size: 1.6rem; font-weight: 700;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--success);
    text-shadow: 0 0 30px var(--success-glow);
  }
  .win-sub {
    font-size: 0.85rem; color: var(--text-dim);
    letter-spacing: 0.08em;
  }
  .win-timer {
    font-size: 2.5rem; font-weight: 700;
    color: var(--text); font-family: var(--font);
  }
  .win-hint {
    font-size: 0.7rem; color: var(--text-dim);
    letter-spacing: 0.1em; text-transform: uppercase;
  }

  /* Mobile */
  @media (max-width: 640px) {
    .move-grid { grid-template-columns: repeat(6, 1fr); }
    .move-btn { height: 44px; font-size: 0.85rem; }
    #controls { height: 180px; gap: 10px; padding: 10px 12px; }
    #canvas-container { bottom: 180px; }
  }
</style>
</head>
<body>

<!-- STATUS -->
<div id="status-bar">
  <div id="status-left">CUBE_CHALLENGE<span>v1.0</span></div>
  <div id="status-right">
    <div class="status-dot"></div>
    <div id="move-counter">MOVES: <span id="moves">0</span></div>
  </div>
</div>

<!-- CANVAS -->
<div id="canvas-container"></div>

<!-- FLASH -->
<div id="flash">MESSAGE</div>

<!-- WIN OVERLAY -->
<div id="win-overlay">
  <div class="win-title">SYSTEM UNLOCKED</div>
  <div class="win-sub">Portfolio Access Granted</div>
  <div class="win-timer" id="win-timer">2</div>
  <div class="win-hint">Redirecting to neural hub...</div>
</div>

<!-- CONTROLS -->
<div id="controls">
  <div class="move-grid">
    <button class="move-btn" data-move="U" onclick="doMove('U')">U</button>
    <button class="move-btn prime" data-move="U'" onclick="doMove('U')">U</button>
    <button class="move-btn" data-move="D" onclick="doMove('D')">D</button>
    <button class="move-btn prime" data-move="D'" onclick="doMove('D')">D</button>
    <button class="move-btn" data-move="L" onclick="doMove('L')">L</button>
    <button class="move-btn prime" data-move="L'" onclick="doMove('L')">L</button>
    <button class="move-btn" data-move="R" onclick="doMove('R')">R</button>
    <button class="move-btn prime" data-move="R'" onclick="doMove('R')">R</button>
    <button class="move-btn" data-move="F" onclick="doMove('F')">F</button>
    <button class="move-btn prime" data-move="F'" onclick="doMove('F')">F</button>
    <button class="move-btn" data-move="B" onclick="doMove('B')">B</button>
    <button class="move-btn prime" data-move="B'" onclick="doMove('B')">B</button>
  </div>
  <div class="action-row">
    <button class="action-btn" id="scramble-btn" onclick="scrambleCube()">SCRAMBLE</button>
    <button class="action-btn" id="solve-btn" onclick="checkSolved()">SOLVED</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ========================
// CONFIG
// ========================
const PORTFOLIO_URL = 'harsh-neural-portfolio.html'; // Change this to your real URL

// ========================
// SCENE SETUP
// ========================
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0c);

const camera = new THREE.PerspectiveCamera(45, container.clientWidth/container.clientHeight, 0.1, 100);
camera.position.set(5.5, 5, 7);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.autoRotate = true;
controls.autoRotateSpeed = 1.2;
controls.enablePan = false;
controls.minDistance = 5;
controls.maxDistance = 14;

// Lights
scene.add(new THREE.AmbientLight(0x404060, 0.6));
const key = new THREE.DirectionalLight(0xffffff, 1.0);
key.position.set(8, 10, 6);
scene.add(key);
const fill = new THREE.DirectionalLight(0x6060ff, 0.3);
fill.position.set(-6, 4, -8);
scene.add(fill);

// ========================
// CRAYON TEXTURES
// ========================
const CRAYON = {
  right: '#e8483c',
  left: '#f5922e',
  top: '#fdfaf1',
  bottom: '#f4d334',
  front: '#4caf5e',
  back: '#3d8fd6'
};
const PAPER = '#3a3128';

function crayonTexture(hex, isFace) {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 256;
  const ctx = c.getContext('2d');
  ctx.fillStyle = hex;
  ctx.fillRect(0, 0, 256, 256);
  ctx.strokeStyle = isFace ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.4)';
  ctx.lineCap = 'round';
  for (let i = 0; i < 70; i++) {
    ctx.lineWidth = 1 + Math.random() * 3;
    ctx.globalAlpha = 0.12 + Math.random() * 0.2;
    const x1 = Math.random() * 256, y1 = Math.random() * 256;
    const angle = Math.random() * Math.PI;
    const len = 20 + Math.random() * 60;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x1 + Math.cos(angle) * len, y1 + Math.sin(angle) * len);
    ctx.stroke();
  }
  ctx.globalAlpha = 0.06;
  ctx.strokeStyle = isFace ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 6;
  ctx.strokeRect(4, 4, 248, 248);
  const tex = new THREE.CanvasTexture(c);
  tex.needsUpdate = true;
  return tex;
}

function stickerMat(hex, isFace) {
  return new THREE.MeshStandardMaterial({
    map: crayonTexture(hex, isFace),
    roughness: 0.85,
    metalness: 0.02
  });
}

// ========================
// CUBE BUILD
// ========================
const cubeGroup = new THREE.Group();
scene.add(cubeGroup);

const SIZE = 0.95;
const GAP = 1.02;
const cubies = [];

for (let x = -1; x <= 1; x++) {
for (let y = -1; y <= 1; y++) {
for (let z = -1; z <= 1; z++) {
  const geo = new THREE.BoxGeometry(SIZE, SIZE, SIZE, 2, 2, 2);
  const mats = [
    stickerMat(CRAYON.right, x === 1),
    stickerMat(CRAYON.left, x === -1),
    stickerMat(CRAYON.top, y === 1),
    stickerMat(CRAYON.bottom, y === -1),
    stickerMat(CRAYON.front, z === 1),
    stickerMat(CRAYON.back, z === -1)
  ];
  const mesh = new THREE.Mesh(geo, mats);
  mesh.position.set(x * GAP, y * GAP, z * GAP);
  mesh.userData.logicalPos = new THREE.Vector3(x, y, z);
  cubeGroup.add(mesh);
  cubies.push(mesh);
}}}

const edges = new THREE.EdgesGeometry(new THREE.BoxGeometry(SIZE, SIZE, SIZE));
cubies.forEach(c => {
  const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x2a2118, linewidth: 1 }));
  line.position.copy(c.position);
  cubeGroup.add(line);
  c.userData.edgeLine = line;
});

// ========================
// MOVE LOGIC
// ========================
const MOVES = {
  U: { axis: 'y', layer: 1, dir: 1 },
  "U'": { axis: 'y', layer: 1, dir: -1 },
  D: { axis: 'y', layer: -1, dir: -1 },
  "D'": { axis: 'y', layer: -1, dir: 1 },
  R: { axis: 'x', layer: 1, dir: 1 },
  "R'": { axis: 'x', layer: 1, dir: -1 },
  L: { axis: 'x', layer: -1, dir: -1 },
  "L'": { axis: 'x', layer: -1, dir: 1 },
  F: { axis: 'z', layer: 1, dir: 1 },
  "F'": { axis: 'z', layer: 1, dir: -1 },
  B: { axis: 'z', layer: -1, dir: -1 },
  "B'": { axis: 'z', layer: -1, dir: 1 }
};

let isAnimating = false;
let moveCount = 0;
let scrambleHistory = [];
let isScrambled = false;

function updateMoveCounter() {
  document.getElementById('moves').textContent = moveCount;
}

function setButtonsDisabled(disabled) {
  document.querySelectorAll('.move-btn, .action-btn').forEach(btn => {
    btn.disabled = disabled;
  });
}

function showFlash(msg, type = '') {
  const flash = document.getElementById('flash');
  flash.textContent = msg;
  flash.className = 'show ' + type;
  setTimeout(() => flash.classList.remove('show'), 2000);
}

function doMove(moveName, duration = 420) {
  return new Promise((resolve) => {
    if (isAnimating) { resolve(); return; }
    isAnimating = true;
    setButtonsDisabled(true);
    controls.autoRotate = false;

    const m = MOVES[moveName];
    const layerCubies = cubies.filter(c => Math.round(c.userData.logicalPos[m.axis]) === m.layer);
    const pivot = new THREE.Group();
    scene.add(pivot);
    layerCubies.forEach(c => {
      cubeGroup.remove(c);
      cubeGroup.remove(c.userData.edgeLine);
      pivot.add(c);
      pivot.add(c.userData.edgeLine);
    });

    const targetAngle = m.dir * Math.PI / 2;
    const startTime = performance.now();

    function animate(now) {
      const t = Math.min((now - startTime) / duration, 1);
      const eased = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
      pivot.rotation[m.axis] = eased * targetAngle;
      if (t < 1) {
        requestAnimationFrame(animate);
      } else {
        pivot.rotation[m.axis] = targetAngle;
        pivot.updateMatrixWorld(true);
        layerCubies.forEach(c => {
          c.updateMatrixWorld(true);
          const worldPos = new THREE.Vector3();
          c.getWorldPosition(worldPos);
          const worldQuat = new THREE.Quaternion();
          c.getWorldQuaternion(worldQuat);
          pivot.remove(c);
          pivot.remove(c.userData.edgeLine);
          cubeGroup.add(c);
          cubeGroup.add(c.userData.edgeLine);
          c.position.copy(worldPos);
          c.quaternion.copy(worldQuat);
          c.position.x = Math.round(c.position.x / GAP) * GAP;
          c.position.y = Math.round(c.position.y / GAP) * GAP;
          c.position.z = Math.round(c.position.z / GAP) * GAP;
          c.userData.logicalPos.set(
            Math.round(c.position.x / GAP),
            Math.round(c.position.y / GAP),
            Math.round(c.position.z / GAP)
          );
          c.userData.edgeLine.position.copy(c.position);
          c.userData.edgeLine.quaternion.copy(c.quaternion);
        });
        scene.remove(pivot);
        isAnimating = false;
        setButtonsDisabled(false);
        controls.autoRotate = true;
        resolve();
      }
    }
    requestAnimationFrame(animate);
  });
}

function inverse(move) {
  return move.endsWith("'") ? move.slice(0, -1) : move + "'";
}

async function scrambleCube() {
  if (isAnimating) return;
  moveCount = 0;
  updateMoveCounter();
  scrambleHistory = [];
  isScrambled = true;

  const pool = Object.keys(MOVES);
  // Exactly 3 random moves
  for (let i = 0; i < 3; i++) {
    const move = pool[Math.floor(Math.random() * pool.length)];
    scrambleHistory.push(move);
    await doMove(move, 380);
    moveCount++;
    updateMoveCounter();
  }
  showFlash('CUBE SCRAMBLED — REVERSE THE MOVES', 'error');
}

function checkSolved() {
  if (!isScrambled) {
    showFlash('SCRAMBLE FIRST', '');
    return;
  }
  if (isAnimating) return;

  // Check if all cubies are at original positions with original orientations
  let solved = true;
  for (const c of cubies) {
    const lp = c.userData.logicalPos;
    if (lp.x !== 0 || lp.y !== 0 || lp.z !== 0) {
      // Not center — check if it's in correct position
      // For a solved cube, each cubie should be at its original logical position
      // We need to compare current logicalPos with original position
      // Actually, for a standard cube, the solved state means:
      // Each face color is on the correct side
      // Simpler check: all cubies at their starting positions
    }
  }

  // Simpler solved check: all cubies at their original grid positions
  // Since we track logicalPos, a solved cube means every cubie is at its original position
  // But we need to know original positions... let's use the initial positions
  // Actually, for this game, we just check if the cube is back to initial state
  // Since scramble is exactly 3 moves, we can check if the reverse sequence brings it back
  // But simpler: check if all stickers face the correct direction

  // Let's do a geometric check: is the cube in solved state?
  const solvedPositions = [];
  let idx = 0;
  for (let x = -1; x <= 1; x++) {
    for (let y = -1; y <= 1; y++) {
      for (let z = -1; z <= 1; z++) {
        if (Math.abs(cubies[idx].position.x - x * GAP) > 0.01 ||
            Math.abs(cubies[idx].position.y - y * GAP) > 0.01 ||
            Math.abs(cubies[idx].position.z - z * GAP) > 0.01) {
          solved = false;
        }
        idx++;
      }
    }
  }

  if (solved) {
    showFlash('SYSTEM UNLOCKED', 'success');
    document.getElementById('win-overlay').classList.add('active');
    let sec = 2;
    const timer = document.getElementById('win-timer');
    timer.textContent = sec;
    const interval = setInterval(() => {
      sec--;
      timer.textContent = sec;
      if (sec <= 0) {
        clearInterval(interval);
        window.location.href = PORTFOLIO_URL;
      }
    }, 1000);
  } else {
    showFlash('NOT SOLVED — KEEP TRYING', 'error');
  }
}

// ========================
// KEYBOARD
// ========================
window.addEventListener('keydown', (e) => {
  if (isAnimating) return;
  const key = e.key.toUpperCase();
  const shift = e.shiftKey;
  const map = {
    'U': shift ? "U'" : 'U',
    'D': shift ? "D'" : 'D',
    'L': shift ? "L'" : 'L',
    'R': shift ? "R'" : 'R',
    'F': shift ? "F'" : 'F',
    'B': shift ? "B'" : 'B'
  };
  if (map[key]) {
    doMove(map[key]);
    moveCount++;
    updateMoveCounter();
  }
});

// ========================
// RESIZE
// ========================
window.addEventListener('resize', () => {
  const w = container.clientWidth;
  const h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

// ========================
// ANIMATION
// ========================
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// Expose to window for onclick handlers
window.doMove = function(moveName) {
  doMove(moveName).then(() => {
    moveCount++;
    updateMoveCounter();
  });
};
window.scrambleCube = scrambleCube;
window.checkSolved = checkSolved;
</script>
</body>
</html>
